name: Auto Comment on Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title
            const body = context.payload.issue.body
            let comment = 'Gracias por abrir este issue!'

            if (title.toLowerCase().includes('bug')) {
              comment = `**Gracias por reportar un bug!** 

Por favor asegurate de incluir:
- Pasos para reproducir
- Comportamiento esperado vs actual
- Capturas de pantalla si aplica`
            }

            if (title.toLowerCase().includes('feature') || title.toLowerCase().includes('mejora')) {
              comment = `**Gracias por sugerir una mejora!**

Cuentanos mas sobre:
- El problema que resolveria
- Como lo implementarias`
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
