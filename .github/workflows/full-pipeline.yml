name: Full CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ./app
      - run: npm run lint
        continue-on-error: true
        working-directory: ./app

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
        working-directory: ./app
      - run: npm test
        working-directory: ./app

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p dist
          cp -r app/public/* dist/
          echo "SHA: ${{ github.sha }}" > dist/version.txt
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 5
      - name: Build summary
        run: |
          echo "Build completado para commit ${{ github.sha }}"
          ls -la dist/

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "Pipeline automatico" \
            --generate-notes
          echo "Release $VERSION creado"
